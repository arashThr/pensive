services:
  db:
    image: pgvector/pgvector:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/17/docker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - app-network
    volumes:
      - ./data:/var/lib/postgresql/

  tts:
    build:
      context: ./tts
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./uploads/podcasts:/app/uploads/podcasts
    # No external ports - only accessible within app-network

networks:
  app-network:
    driver: bridge
