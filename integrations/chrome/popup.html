<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pensive</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #f5f5f5;
      --bg-raised:    #ffffff;
      --border:       #e0e0e0;
      --text:         #111111;
      --text-muted:   #666666;
      --track:        #d4d4d4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #141414;
        --bg-raised:    #1e1e1e;
        --border:       #2a2a2a;
        --text:         #f0f0f0;
        --text-muted:   #888888;
        --track:        #333333;
      }
    }

    html, body {
      border-radius: 12px;
      overflow: hidden;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      width: 340px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container { padding: 18px; }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo  { width: 22px; height: 22px; margin-right: 9px; }
    .title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }

    .page-info {
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .page-url {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ---- Status ---- */
    .status {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      padding: 11px 13px;
      font-size: 13px;
      font-weight: 600;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
    }

    .status.saved     { background: #f0faf4; border-color: #a3d9b1; color: #1a7a3c; }
    .status.error     { background: #fff4f4; border-color: #f5b8b8; color: #b91c1c; }
    .status.not-saved { color: var(--text-muted); }

    @media (prefers-color-scheme: dark) {
      .status.saved  { background: #0f2e1a; border-color: #2a6640; color: #6ee09a; }
      .status.error  { background: #2a0f0f; border-color: #6b2020; color: #f87171; }
    }

    .status.not-configured { padding: 0; display: block; color: var(--text); }

    .not-configured-content { text-align: center; padding: 16px; }

    .not-configured-message {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 12px;
    }

    .not-configured-actions { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

    .not-configured-btn {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      font-size: 12px;
      padding: 7px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: background-color 0.15s;
    }

    .not-configured-btn:hover { background: var(--bg-raised); }

    /* ---- Spinner ---- */
    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid var(--track);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 9px;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Buttons ---- */
    .actions { display: flex; gap: 8px; margin-bottom: 14px; }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg-raised);
      color: var(--text);
      transition: background-color 0.15s;
    }

    .btn:hover:not(:disabled) { background: var(--bg); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ---- Footer ---- */
    .footer { padding-top: 14px; border-top: 1px solid var(--border); }

    .footer-links { display: flex; justify-content: space-between; align-items: center; }

    .footer-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .footer-link:hover  { color: var(--text); }
    .footer-link svg    { width: 13px; height: 13px; margin-right: 5px; }

    /* ---- Auto-save notice ---- */
    .auto-save-notice {
      margin-bottom: 14px;
      padding: 11px 13px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .notice-content { display: flex; align-items: center; gap: 7px; }
    .notice-icon    { width: 13px; height: 13px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="icons/icon48.png" alt="Pensive" class="logo">
      <div class="title">Pensive</div>
    </div>
    
    <!-- Page Information -->
    <div class="page-info">
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-url" id="pageUrl">Loading...</div>
    </div>
    
    <!-- Status Display -->
    <div class="status loading" id="status">
      <div class="spinner"></div>
      <span>Checking status...</span>
    </div>
    
    <!-- Not Configured State -->
    <div class="status not-configured" id="notConfiguredStatus" style="display: none;">
      <div class="not-configured-content">
        <div class="not-configured-message">Account not connected</div>
        <div class="not-configured-actions">
          <a href="#" class="not-configured-btn" id="createAccountBtn">Create Account</a>
          <a href="#" class="not-configured-btn" id="connectAccountBtn">Connect Account</a>
        </div>
      </div>
    </div>
    
    <!-- Action Buttons - Not Saved State -->
    <div class="actions" id="actions">
      <button class="btn" id="saveBtn" disabled>Save Page</button>
      <button class="btn" id="removeBtn" disabled>Remove</button>
    </div>

    <!-- Action Buttons - Saved State -->
    <div class="actions" id="actions-saved" style="display: none;">
      <button class="btn" id="viewSavedBtn">View Saved</button>
      <button class="btn" id="removeSavedBtn">Remove</button>
    </div>
    
    <!-- Auto-save notice -->
    <div class="auto-save-notice" id="autoSaveNotice" style="display: none;">
      <div class="notice-content">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="notice-icon">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Use Save button to bookmark this page</span>
      </div>
    </div>
    
    <!-- Footer Navigation -->
    <div class="footer">
      <div class="footer-links">
        <a href="#" class="footer-link" id="searchLink">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          Search
        </a>
        <a href="#" class="footer-link" id="settingsLink">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </a>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
