services:
  server:
    build:
      context: ./
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ~/credentials/service-account.json:/app/credentials/service-account.json:ro,z
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  bot:
    build:
      context: ./
      dockerfile: ./integrations/telegram/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M


  # Make sure to run init-db.sh before starting the db
  db:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2048M
    volumes:
      - ~/data/getpensive.com/psql:/var/lib/postgresql/
